# Default values for FitFolio.
# This is a YAML-formatted file.

replicaCount: 2

image:
  repository: shahrintarin/fitfolio-server
  pullPolicy: IfNotPresent
  tag: "latest"

service:
  type: ClusterIP
  port: 80
  targetPort: 3000

ingress:
  enabled: true
  className: "nginx"
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    - host: api.fitfolio.example.com
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls:
    - secretName: fitfolio-tls
      hosts:
        - api.fitfolio.example.com

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 200m
    memory: 256Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

env:
  NODE_ENV: production
  PORT: "3000"

secrets:
  JWT_SECRET_KEY: "change-me-at-runtime"
  STRIPE_SK_KEY: "change-me-at-runtime"
  MONGODB_URI: "mongodb://user:pass@host:port/db"
