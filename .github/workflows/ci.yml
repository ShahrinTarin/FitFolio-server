      #     context: .
      #     push: true
      #     tags: |
      #       shahrintarin/fitfolio-server:latest
      #       shahrintarin/fitfolio-server:${{ github.sha }}
      #     cache-from: type=gha
      #     cache-to: type=gha,mode=max

  k8s-lint:
    name: Helm Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Helm
        uses: azure/setup-helm@v4.2.0
      - name: Helm Lint
        run: helm lint deploy/charts/fitfolio
